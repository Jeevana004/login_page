<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mother Theresa Hostel Signup</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f4f7fb;
            padding:30px;
        }

        .signup-container{
            width:450px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0px 0px 25px rgba(0,0,0,0.15);
        }

        .signup-container h1{
            text-align:center;
            color:#2c3e50;
            margin-bottom:10px;
            font-size:38px;
        }

        .signup-container p{
            text-align:center;
            color:gray;
            margin-bottom:30px;
            font-size:15px;
        }

        .input-group{
            margin-bottom:20px;
        }

        .input-group label{
            display:block;
            margin-bottom:8px;
            color:#333;
            font-size:16px;
            font-weight:bold;
        }

        .input-group input{
            width:100%;
            padding:14px;
            border:1px solid #ccc;
            border-radius:12px;
            outline:none;
            font-size:16px;
            transition:0.3s;
        }

        .input-group input:focus{
            border-color:#3498db;
            box-shadow:0px 0px 8px rgba(52,152,219,0.4);
        }

        .signup-btn{
            width:100%;
            padding:15px;
            border:none;
            border-radius:12px;
            background:linear-gradient(to right,#3498db,#2c3e50);
            color:white;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        .signup-btn:hover{
            transform:scale(1.02);
            background:linear-gradient(to right,#2980b9,#1f2d3d);
        }

        .login-link{
            text-align:center;
            margin-top:20px;
            color:#555;
        }

        .login-link a{
            text-decoration:none;
            color:#3498db;
            font-weight:bold;
        }

        .login-link a:hover{
            text-decoration:underline;
        }

        .error{
            color:red;
            font-size:13px;
            margin-top:5px;
        }

    </style>

</head>

<body>

    <div class="signup-container">

        <h1>Sign Up</h1>

        <p>Mother Theresa Hostel Management System</p>

        <form id="signupForm">

            <!-- Full Name -->

            <div class="input-group">

                <label>Full Name</label>

                <input 
                    type="text"
                    id="fullname"
                    placeholder="Enter Full Name"
                    title="Full Name should contain only alphabets and length must be between 5 to 15 characters"
                >

                <div class="error" id="fullnameError"></div>

            </div>

            <!-- Username -->

            <div class="input-group">

                <label>Username</label>

                <input 
                    type="text"
                    id="username"
                    placeholder="Enter Username"
                    title="Username should contain only alphabets and length must be between 5 to 15 characters"
                >

                <div class="error" id="usernameError"></div>

            </div>

            <!-- Email -->

            <div class="input-group">

                <label>Email</label>

                <input 
                    type="email"
                    id="email"
                    placeholder="Enter Email"
                    title="Enter a valid email address"
                >

                <div class="error" id="emailError"></div>

            </div>

            <!-- Phone Number -->

            <div class="input-group">

                <label>Phone Number</label>

                <input 
                    type="text"
                    id="phone"
                    placeholder="Enter Phone Number"
                    title="Phone number should contain exactly 10 digits"
                >

                <div class="error" id="phoneError"></div>

            </div>

            <!-- Password -->

            <div class="input-group">

                <label>Password</label>

                <input 
                    type="password"
                    id="password"
                    placeholder="Enter Password"

                    title="Password must contain:
• Minimum 8 characters
• One uppercase letter
• One lowercase letter
• One number
• One special character (!@#$%^&*)"
                >

                <div class="error" id="passwordError"></div>

            </div>

            <!-- Confirm Password -->

            <div class="input-group">

                <label>Confirm Password</label>

                <input 
                    type="password"
                    id="confirmPassword"
                    placeholder="Confirm Password"
                    title="Confirm password should match the password entered above"
                >

                <div class="error" id="confirmPasswordError"></div>

            </div>

            <!-- Button -->

            <button type="submit" class="signup-btn">

                Create Account

            </button>

        </form>

        <!-- Login Link -->

        <div class="login-link">

            Already have an account?

            <a href="#">Login</a>

        </div>

    </div>

    <!-- JavaScript Validation -->

    <script>

        let form = document.getElementById("signupForm");

        form.addEventListener("submit", function(event){

            event.preventDefault();

            // INPUT VALUES

            let fullname =
            document.getElementById("fullname").value.trim();

            let username =
            document.getElementById("username").value.trim();

            let email =
            document.getElementById("email").value.trim();

            let phone =
            document.getElementById("phone").value.trim();

            let password =
            document.getElementById("password").value.trim();

            let confirmPassword =
            document.getElementById("confirmPassword").value.trim();

            // ERROR ELEMENTS

            let fullnameError =
            document.getElementById("fullnameError");

            let usernameError =
            document.getElementById("usernameError");

            let emailError =
            document.getElementById("emailError");

            let phoneError =
            document.getElementById("phoneError");

            let passwordError =
            document.getElementById("passwordError");

            let confirmPasswordError =
            document.getElementById("confirmPasswordError");

            // CLEAR ERRORS

            fullnameError.innerHTML = "";

            usernameError.innerHTML = "";

            emailError.innerHTML = "";

            phoneError.innerHTML = "";

            passwordError.innerHTML = "";

            confirmPasswordError.innerHTML = "";

            let valid = true;

            // FULL NAME VALIDATION

            if(!/^[A-Za-z ]{5,15}$/.test(fullname)){

                fullnameError.innerHTML =
                "Full Name must contain only alphabets (5-15 characters)";

                valid = false;
            }

            // USERNAME VALIDATION

            if(!/^[A-Za-z]{5,15}$/.test(username)){

                usernameError.innerHTML =
                "Username must contain only alphabets (5-15 characters)";

                valid = false;
            }

            // EMAIL VALIDATION

            let emailPattern =
            /^[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.[a-z]{2,}$/;

            if(!emailPattern.test(email)){

                emailError.innerHTML =
                "Please enter a valid email address";

                valid = false;
            }

            // PHONE VALIDATION

            if(!/^[0-9]{10}$/.test(phone)){

                phoneError.innerHTML =
                "Phone number must contain exactly 10 digits";

                valid = false;
            }

            // PASSWORD VALIDATION

            if(password.length < 8){

                passwordError.innerHTML =
                "Password must contain minimum 8 characters";

                valid = false;
            }

            else if(!/[A-Z]/.test(password)){

                passwordError.innerHTML =
                "Password must contain at least one uppercase letter";

                valid = false;
            }

            else if(!/[a-z]/.test(password)){

                passwordError.innerHTML =
                "Password must contain at least one lowercase letter";

                valid = false;
            }

            else if(!/[0-9]/.test(password)){

                passwordError.innerHTML =
                "Password must contain at least one number";

                valid = false;
            }

            else if(!/[!@#$%^&*]/.test(password)){

                passwordError.innerHTML =
                "Password must contain at least one special character";

                valid = false;
            }

            // CONFIRM PASSWORD VALIDATION

            if(password !== confirmPassword){

                confirmPasswordError.innerHTML =
                "Passwords do not match";

                valid = false;
            }

            // SUCCESS

            if(valid){

                alert("Signup Successful!");

                form.reset();
            }

        });

    </script>

</body>

</html>
