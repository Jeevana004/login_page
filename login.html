<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mother Theresa Hostel Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f4f7fb;
            padding:20px;
        }

        .login-container{
            width:420px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0px 0px 25px rgba(0,0,0,0.15);
        }

        .login-container h1{
            text-align:center;
            color:#2c3e50;
            margin-bottom:10px;
            font-size:38px;
        }

        .login-container p{
            text-align:center;
            color:gray;
            margin-bottom:30px;
            font-size:15px;
        }

        .input-group{
            margin-bottom:22px;
        }

        .input-group label{
            display:block;
            margin-bottom:8px;
            color:#333;
            font-size:16px;
            font-weight:bold;
        }

        .input-group input{
            width:100%;
            padding:14px;
            border:1px solid #ccc;
            border-radius:12px;
            outline:none;
            font-size:16px;
            transition:0.3s;
        }

        .input-group input:focus{
            border-color:#3498db;
            box-shadow:0px 0px 8px rgba(52,152,219,0.4);
        }

        .remember-forgot{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:25px;
            font-size:14px;
            color:#555;
        }

        .remember-forgot a{
            color:#3498db;
            text-decoration:none;
            font-weight:bold;
        }

        .remember-forgot a:hover{
            text-decoration:underline;
        }

        .login-btn{
            width:100%;
            padding:15px;
            border:none;
            border-radius:12px;
            background:linear-gradient(to right,#3498db,#2c3e50);
            color:white;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        .login-btn:hover{
            transform:scale(1.02);
            background:linear-gradient(to right,#2980b9,#1f2d3d);
        }

        .signup-link{
            text-align:center;
            margin-top:25px;
            color:#555;
        }

        .signup-link a{
            color:#3498db;
            text-decoration:none;
            font-weight:bold;
        }

        .signup-link a:hover{
            text-decoration:underline;
        }

        .error{
            color:red;
            font-size:13px;
            margin-top:6px;
        }

    </style>

</head>

<body>

    <div class="login-container">

        <h1>Hostel Login</h1>

        <p>Mother Theresa Hostel Management System</p>

        <form id="loginForm">

            <!-- Username -->

            <div class="input-group">

                <label>Username</label>

                <input 
                    type="text"
                    id="username"
                    placeholder="Enter Username"
                >

                <div class="error" id="usernameError"></div>

            </div>

            <!-- Password -->

            <div class="input-group">

                <label>Password</label>

                <input 
                    type="password"
                    id="password"
                    placeholder="Enter Password"
                >

                <div class="error" id="passwordError"></div>

            </div>

            <!-- Remember Me -->

            <div class="remember-forgot">

                <div>
                    <input type="checkbox">
                    Remember Me
                </div>

                <a href="#">Forgot Password?</a>

            </div>

            <!-- Login Button -->

            <button type="submit" class="login-btn">

                Login

            </button>

        </form>

        <!-- Signup Link -->

        <div class="signup-link">

            Don't have an account?

            <a href="#">Signup</a>

        </div>

    </div>

    <!-- JavaScript Validation -->

    <script>

        let form = document.getElementById("loginForm");

        form.addEventListener("submit", function(event){

            event.preventDefault();

            let username =
            document.getElementById("username").value.trim();

            let password =
            document.getElementById("password").value.trim();

            let usernameError =
            document.getElementById("usernameError");

            let passwordError =
            document.getElementById("passwordError");

            usernameError.innerHTML = "";

            passwordError.innerHTML = "";

            let valid = true;

            // USERNAME VALIDATION

            if(username.length < 5){

                usernameError.innerHTML =
                "Username must contain minimum 5 characters";

                valid = false;
            }

            else if(username.length > 15){

                usernameError.innerHTML =
                "Username must contain maximum 15 characters";

                valid = false;
            }

            else if(!/^[A-Za-z]+$/.test(username)){

                usernameError.innerHTML =
                "Username should contain only alphabets";

                valid = false;
            }

            // PASSWORD VALIDATION

            if(password.length < 8){

                passwordError.innerHTML =
                "Password must contain minimum 8 characters";

                valid = false;
            }

            else if(!/[A-Z]/.test(password)){

                passwordError.innerHTML =
                "Password must contain one uppercase letter";

                valid = false;
            }

            else if(!/[a-z]/.test(password)){

                passwordError.innerHTML =
                "Password must contain one lowercase letter";

                valid = false;
            }

            else if(!/[0-9]/.test(password)){

                passwordError.innerHTML =
                "Password must contain one number";

                valid = false;
            }

            else if(!/[!@#$%^&*]/.test(password)){

                passwordError.innerHTML =
                "Password must contain one special character";

                valid = false;
            }

            // SUCCESS

            if(valid){

                alert("Login Successful!");

                window.location.href = "dashboard.html";
            }

        });

    </script>

</body>

</html>
