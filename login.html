<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beautiful Login Page</title>

    <style>

        body{
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            font-family: Arial, Helvetica, sans-serif;
        }

        .login-box{
            width: 350px;
            background-color: white;
            padding: 40px;
            margin: 100px auto;
            border-radius: 15px;
            box-shadow: 0px 0px 20px gray;
        }

        h1{
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        label{
            font-size: 18px;
            font-weight: bold;
            color: #444;
        }

        input[type="text"],
        input[type="password"]{
            width: 100%;
            height: 40px;
            margin-top: 10px;
            margin-bottom: 20px;
            border: 1px solid gray;
            border-radius: 8px;
            padding-left: 10px;
            font-size: 16px;
        }

        .remember{
            margin-bottom: 20px;
        }

        button{
            width: 100%;
            height: 45px;
            background-color: #4A90E2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover{
            background-color: #357ABD;
        }

        p{
            text-align: center;
            margin-top: 20px;
        }

        a{
            text-decoration: none;
            color: #4A90E2;
            font-weight: bold;
        }

    </style>
</head>

<body>

    <div class="login-box">

        <h1>Login</h1>

        <form>

            <label>Username</label>

           <input 
    type="text"
    placeholder="Enter Username"
    minlength="5"
    maxlength="15"
    pattern="[A-Za-z]{5,15}"
    title="Username should contain only alphabets and length must be between 5 to 15 characters"
    required
>

            <label>Password</label>

            <input 
                type="password"
                placeholder="Enter Password"
                title="Password is required"
                required
            >

            <div class="remember">
                <input type="checkbox">
                <label>Remember me</label>
            </div>

            <button type="submit">Login</button>

        </form>

        <p>
            Don't have an account?
            <a href="#">Sign Up</a>
        </p>

    </div>

</body>
</html>
