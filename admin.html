<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostel Management Admin Login</title>

    <style>

        body{
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(to right, #1d4350, #a43931);
        }

        .login-container{
            width: 380px;
            background-color: white;
            padding: 40px;
            margin: 80px auto;
            border-radius: 15px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.4);
        }

        h1{
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }

        .logo{
            text-align: center;
            font-size: 60px;
            margin-bottom: 10px;
        }

        label{
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        input{
            width: 100%;
            height: 42px;
            margin-top: 10px;
            margin-bottom: 20px;
            border: 1px solid #bbb;
            border-radius: 8px;
            padding-left: 10px;
            font-size: 16px;
        }

        input:focus{
            outline: none;
            border-color: #3498db;
        }

        .remember{
            margin-bottom: 20px;
        }

        button{
            width: 100%;
            height: 45px;
            border: none;
            border-radius: 8px;
            background-color: #2c3e50;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover{
            background-color: #34495e;
        }

        p{
            text-align: center;
            margin-top: 20px;
        }

        a{
            text-decoration: none;
            color: #3498db;
            font-weight: bold;
        }

    </style>
</head>

<body>

    <div class="login-container">

        <div class="logo">🏨</div>

        <h1>Admin Login</h1>

        <form>

            <label>Admin Username</label>

            <input 
                type="text"
                placeholder="Enter Admin Username"
                minlength="5"
                maxlength="15"
                pattern="[A-Za-z]{5,15}"
                title="Username should contain only alphabets and length must be between 5 to 15 characters"
                required
            >

            <label>Password</label>

            <input 
                type="password"
                placeholder="Enter Password"
                minlength="6"
                title="Password must contain at least 6 characters"
                required
            >

            <div class="remember">
                <input type="checkbox" style="width:auto; height:auto;">
                <label>Remember Me</label>
            </div>

            <button type="submit">Login</button>

        </form>

        <p>
            Forgot Password?
            <a href="#">Reset</a>
        </p>

    </div>

</body>
</html>
